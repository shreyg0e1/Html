
<!-- BLOCK ELEMENTS -->


<p style="background-color: aqua;">This is a block element</p>
<h2 style="background-color: blueviolet;">This is also a block element</h2>

<!-- Inline Elements -->

<img src="../Multipage/img1.jpg" alt="img" height="200" width="400" style="background-color: rgb(201, 246, 18);">
<a href="https://www.google.com" style="background-color: rgb(12, 250, 79);">google</a>



<!-- Converting block element into inline element -->
<p style="background-color: brown; display: inline;">This is a block element </p>


<!-- Converting inline element into block element -->
<p style="background-color: brown; display: block;">This is a block element </p>


<!-- Checking strong and bold tag are inline or block elements -->
<strong style="background-color: aqua;">hello guys </strong>
<b style="background-color: brown;">hi</b>
