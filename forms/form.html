<h1>Health Details FORM</h1>

<!-- Personal Information -->
 <form>
    <fieldset>
        <legend>Personal Information</legend>
    <label for="name">Full Name:</label>
    <input type="text" id="name" name="fname" placeholder="Enter your full name"><br><br>

    <label for="date">DOB:</label>
    <input type="date" id="date" name="dob" ><br><br>

    <label for="">Gender:</label>
    <input type="radio" id="male" name="gender" value="Male">
    <label for="male">Male</label>
    <input type="radio" id="Female" name="gender" value="Female">
    <label for="Female">Female</label>
    <input type="radio" id="Other" name="gender" value="Other">
    <label for="Other">Other</label><br><br>

    <label for="phn">Phone Number:</label>
    <input type="tel" id="phn" name="phone"placeholder="Enter your Ph No. "><br><br>
    </fieldset>

    <!-- Medical History -->
     <fieldset>
        <legend>Medical History </legend>
        <label for="bloodgrp">Blood Group:</label>
        <select name="blood group" id="bloodgrp">
            <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
        </select>
        <br><br>

        <label for="">Do you wear glasses or contact lenses:</label>
        <br><br>
        <input type="radio" id="y" name="wear" value="Yes" >
        <label for="y">Yes</label><br><br>
        <input type="radio" id="n" name="wear" value="No">
        <label for="n">No</label><br><br>

        <label for="txt">Pre-existing conditions:</label><br><br>
        <textarea name="condition" id="txt" rows="3" cols="30" placeholder="List any pre-existing conditions"></textarea><br><br>

        <label>Allergies:</label><br><br>
        <input type="checkbox" id="po" name="allergies" value="pollen">
        <label for="po">Pollen</label><br><br>
        <input type="checkbox" id="pe" name="allergies" value="peanut">
        <label for="pe">Peanut</label><br><br>
        <input type="checkbox" id="la" name="allergies" value="latex">
        <label for="la">Latex</label><br><br>
        <input type="checkbox" id="no" name="allergies" value="none">
        <label for="no">None</label><br><br>


        <label for="txts">Current Medications:</label><br><br>
        <textarea name="Medications" id="txts" rows="3" cols="30" placeholder="List any current medications"></textarea><br><br>

     </fieldset>


     <!-- Emergency Contact -->

     <fieldset>
        <legend>Emergency Contact</legend>
<label for="Emergency">Emergency Contact Name:</label>
<input type="text" id="Emergency" name="emergency contact"><br><br>

<label for="ep">Emergency Contact Phone:</label>
<input type="tel" id="ep" name="emergency contact phone"><br><br>

<label for="relation">Relationship to Emergency :</label>
<input type="text" id="relation" name=" relationship"><br><br>
     </fieldset>
     <button>Submit</button>

 </form>
